<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icarus F1 Hub | Deep-Dive Insights</title>
    
    <!-- Stop Favicon 404 -->
    <link rel="icon" href="data:,">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Robust Tailwind Source (JSDelivr is more reliable globally) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.0.0/dist/index.global.js"></script>
    
    <!-- Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        /* Emergency Styles: These work even if Tailwind fails to load */
        :root {
            --f1-red: #FF1801;
            --bg-black: #000000;
        }
        
        body { 
            background-color: var(--bg-black); 
            color: #ffffff; 
            margin: 0; 
            font-family: 'Titillium Web', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        .carbon-pattern {
            background: radial-gradient(circle at 50% 0%, rgba(255, 24, 1, 0.12) 0%, transparent 70%), 
                        linear-gradient(to bottom, #0a0a0a, #000000);
            min-height: 100vh;
        }

        .mesh-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Tailwind Fallback Utilities */
        .text-f1-red { color: var(--f1-red) !important; }
        .bg-f1-red { background-color: var(--f1-red) !important; }
        .border-f1-red { border-color: var(--f1-red) !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--f1-red); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SAFE LIBRARY ACCESS
        const getMotion = () => {
            const lib = window.Motion || window.FramerMotion;
            if (lib && lib.motion) return lib.motion;
            return null;
        };

        const getAnimatePresence = () => {
            const lib = window.Motion || window.FramerMotion;
            if (lib && lib.AnimatePresence) return lib.AnimatePresence;
            return React.Fragment;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('hall-of-fame');
            const [data, setData] = useState({ topDrivers: [], predictions: [], badLuck: [] });
            const [status, setStatus] = useState({ loading: true, error: null });

            useEffect(() => {
                const loadCSV = async (path) => {
                    try {
                        const response = await fetch(path);
                        if (!response.ok) throw new Error(`File not found: ${path}`);
                        const text = await response.text();
                        const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
                        return parsed.data;
                    } catch (e) {
                        console.error(`Error loading ${path}:`, e);
                        throw e;
                    }
                };

                const init = async () => {
                    try {
                        console.log("Starting data fetch...");
                        const [drivers, preds, luck] = await Promise.all([
                            loadCSV('./data/top_drivers_all_time.csv'),
                            loadCSV('./data/final_predictions.csv'),
                            loadCSV('./data/driver_bad_luck_stats.csv')
                        ]);

                        setData({
                            topDrivers: drivers.filter(d => d && d.driver_name).slice(0, 20),
                            predictions: preds.filter(p => p && p.surname),
                            badLuck: luck.filter(l => l && l.driver_name).slice(0, 10)
                        });
                        
                        setStatus({ loading: false, error: null });
                        console.log("Data loaded successfully");
                    } catch (err) {
                        setStatus({ loading: false, error: err.message });
                    }
                };

                // Small delay to ensure browser has parsed all scripts
                setTimeout(init, 400);
            }, []);

            useEffect(() => {
                if (!status.loading && window.lucide) {
                    setTimeout(() => window.lucide.createIcons(), 100);
                }
            }, [activeTab, status.loading]);

            if (status.loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-black">
                        <div className="w-10 h-10 border-2 border-f1-red border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-[10px] font-bold uppercase tracking-[0.4em] text-white/40">Initializing Hub</p>
                    </div>
                );
            }

            if (status.error) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-black p-10 text-center">
                        <div className="text-f1-red text-4xl mb-6">⚠️</div>
                        <h1 className="text-xl font-bold uppercase mb-2">Data Error</h1>
                        <p className="text-white/40 text-sm mb-8 max-w-xs">{status.error}</p>
                        <button onClick={() => window.location.reload()} className="px-6 py-2 border border-f1-red text-f1-red text-[10px] font-bold uppercase tracking-widest hover:bg-f1-red hover:text-white transition-all">
                            Retry Connection
                        </button>
                    </div>
                );
            }

            const motionLib = getMotion();
            const MotionDiv = motionLib ? motionLib.div : 'div';
            const MotionSection = motionLib ? motionLib.section : 'section';
            const AnimatePresence = getAnimatePresence();

            return (
                <div className="min-h-screen carbon-pattern relative overflow-x-hidden">
                    <div className="mesh-overlay"></div>
                    
                    <header className="sticky top-0 z-50 bg-black/90 backdrop-blur-md border-b border-white/5">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-f1-red p-1.5 rounded-sm -rotate-12">
                                    <i data-lucide="flag" className="w-5 h-5 text-white"></i>
                                </div>
                                <h1 className="text-xl font-black italic uppercase tracking-tighter text-f1-red">Icarus F1</h1>
                            </div>
                            
                            <nav className="hidden md:flex gap-8">
                                {['hall-of-fame', 'predictions', 'bad-luck'].map(tab => (
                                    <button 
                                        key={tab} 
                                        onClick={() => setActiveTab(tab)}
                                        className={`text-[10px] font-bold uppercase tracking-[0.2em] transition-all cursor-pointer ${activeTab === tab ? 'text-f1-red' : 'text-white/40 hover:text-white'}`}
                                    >
                                        {tab.replace('-', ' ')}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 py-12 relative z-10">
                        <AnimatePresence mode="wait">
                            {activeTab === 'hall-of-fame' && (
                                <MotionSection key="hof" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="space-y-8">
                                    <div className="border-l-4 border-f1-red pl-6">
                                        <h2 className="text-3xl font-black uppercase italic">Hall of Fame</h2>
                                        <p className="text-white/30 text-[10px] uppercase tracking-widest">Historical Performance Leaders</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {data.topDrivers.map((d, i) => (
                                            <MotionDiv key={i} className="bg-zinc-900/40 border border-white/5 p-5 flex justify-between items-center hover:border-f1-red/40 transition-all">
                                                <div className="flex items-center gap-5">
                                                    <span className="text-2xl font-black italic text-white/5">{String(i+1).padStart(2,'0')}</span>
                                                    <span className="font-bold uppercase tracking-tight text-sm">{d.driver_name}</span>
                                                </div>
                                                <span className="text-f1-red font-black italic">{d.total_points}</span>
                                            </MotionDiv>
                                        ))}
                                    </div>
                                </MotionSection>
                            )}

                            {activeTab === 'predictions' && (
                                <MotionSection key="pred" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="space-y-8">
                                    <div className="border-l-4 border-f1-red pl-6">
                                        <h2 className="text-3xl font-black uppercase italic">2025 Forecast</h2>
                                        <p className="text-white/30 text-[10px] uppercase tracking-widest">Performance Probability Analysis</p>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                        {data.predictions.map((p, i) => (
                                            <MotionDiv key={i} className="bg-zinc-900/60 border border-white/5 p-6 rounded-lg">
                                                <p className="text-[10px] text-white/40 uppercase font-bold mb-1">{p.forename}</p>
                                                <h3 className="text-xl font-black uppercase tracking-tighter mb-4">{p.surname}</h3>
                                                <div className="text-f1-red text-2xl font-black italic">{p.predicted_points_potential}%</div>
                                            </MotionDiv>
                                        ))}
                                    </div>
                                </MotionSection>
                            )}

                            {activeTab === 'bad-luck' && (
                                <MotionSection key="luck" initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="space-y-8">
                                    <div className="border-l-4 border-f1-red pl-6">
                                        <h2 className="text-3xl font-black uppercase italic">Bad Luck Index</h2>
                                        <p className="text-white/30 text-[10px] uppercase tracking-widest">Most Unfortunate Careers</p>
                                    </div>
                                    <div className="space-y-3">
                                        {data.badLuck.map((l, i) => (
                                            <MotionDiv key={i} className="bg-zinc-900/20 border border-white/5 p-4 flex items-center gap-6">
                                                <span className="w-8 text-center font-black text-white/10">{i+1}</span>
                                                <div className="flex-1">
                                                    <div className="font-bold uppercase text-xs mb-1">{l.driver_name}</div>
                                                    <div className="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                                                        <div className="bg-f1-red h-full" style={{width: `${(parseInt(l.count)/Math.max(1, parseInt(data.badLuck[0]?.count || 1)))*100}%`}}></div>
                                                    </div>
                                                </div>
                                                <div className="text-right min-w-[60px]">
                                                    <div className="text-f1-red font-black italic">{l.count}</div>
                                                    <div className="text-[8px] text-white/20 uppercase font-bold">DNFs</div>
                                                </div>
                                            </MotionDiv>
                                        ))}
                                    </div>
                                </MotionSection>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="mt-20 py-10 border-t border-white/5 text-center">
                        <p className="text-[10px] text-white/20 uppercase font-bold tracking-[0.3em]">© 2024 Icarus F1 Hub • Data Driven Insights</p>
                    </footer>

                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/10 p-4 flex justify-around z-50">
                        {['hall-of-fame', 'predictions', 'bad-luck'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`p-2 cursor-pointer ${activeTab === tab ? 'text-f1-red' : 'text-white/30'}`}>
                                <i data-lucide={tab === 'hall-of-fame' ? 'award' : tab === 'predictions' ? 'trending-up' : 'skull'} className="w-5 h-5"></i>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
